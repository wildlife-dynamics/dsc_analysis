[workspace]
platforms = ['linux-64', 'osx-arm64', 'osx-64', 'win-64']

name = "dsc_analysis"
channels = [
  'https://repo.prefix.dev/ecoscope-workflows/',
  'https://repo.prefix.dev/ecoscope-workflows-custom/',
  'conda-forge',
]
[dependencies]
curl = "*"
rattler-build = "*"
yq = "*"
hatch = "*"
pip = "*"
hatch-vcs = "*"

[feature.compile.dependencies]
ecoscope-workflows-ext-distance-sample-counts ="0.0.4.*"
ecoscope-workflows-ext-ste = "0.0.18.*"
ecoscope-workflows-ext-big-life = "0.0.8.*"
ecoscope-workflows-ext-mnc = "0.0.8.*"
ecoscope-workflows-ext-ate = "0.0.3.*"
ecoscope-workflows-core = "0.22.17.*"
ecoscope-workflows-ext-custom = "0.0.50.*"

[environments]
compile = { features = ["compile"], no-default-feature = true }
